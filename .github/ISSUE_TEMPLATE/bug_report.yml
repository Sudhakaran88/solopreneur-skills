name: Bug report
description: Something in a skill is wrong or produces bad output
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill affected
      description: Which skill is this about? (e.g. cold-email, pricing-strategy)
      placeholder: skill-name
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Trigger skill with "..."
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Claude Code version, OS, and any other relevant details.
      placeholder: |
        - Claude Code version:
        - OS:
    validations:
      required: true
